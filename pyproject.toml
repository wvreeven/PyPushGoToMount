[build-system]
requires = ["setuptools", "setuptools_scm"]
build-backend = "setuptools.build_meta"

[project]
name = "PyPushGoToMount"
description = "PyPushGoToMount"
authors = [
    { name = "Wouter van Reeven", email = "wouter@van.reeven.nl" }
]
license = { text = "GPL" }
classifiers = ["Programming Language :: Python :: 3"]
dynamic = ["version"]
dependencies = ["astropy", "Pillow", "jsonschema"]

[tool.setuptools.dynamic]
version = { attr = "setuptools_scm.get_version" }

[tool.setuptools.packages.find]
where = ["python"]

[project.scripts]
run_pushgoto_mount = "pypushgotomount.pushgoto_mount:run_pushgoto_mount"

[tool.setuptools_scm]
write_to = "python/pypushgotomount/version.py"
write_to_template = """
# Generated by setuptools_scm
__all__ = ["__version__"]
__version__ = "{version}"
"""

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    "ignore:Tried to get polar motions for times after IERS data is valid.:", # Ignore AstropyWarning
]

[dependency-groups]
dev = [
    "pytest",
    "pytest-cov",
]
